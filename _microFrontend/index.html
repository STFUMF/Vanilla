<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="apps/shell/style.css">
</head>
<body>

    <div class="app-container">

        <div id="navigation"></div>
        <main class="dashboard">
                <div id="pluginDashboard"></div>
                <div id="notification-root" ></div>
                <div id="theme-root" class="card"></div>

            <section class="stats-section card">
                <h2>Overview</h2>
                <div id="stats-root"></div>
            </section>

            <section class="toolbar card">
                <div id="search-root"></div>
                <div id="filter-root"></div>
            </section>

            <section class="todo-section card">
                <div class="section-header">
                    <h2>My Tasks</h2>
                </div>

                <div id="todo-root"></div>
            </section>

        </main>

        <footer class="app-footer" id="footer"></footer>

    </div>

    <script type="module" src="apps/shell//app.js"></script>

</body>
</html>
